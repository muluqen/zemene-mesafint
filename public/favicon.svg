<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#a88a3c"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <linearGradient id="jewel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0000"/>
      <stop offset="100%" style="stop-color:#880000"/>
    </linearGradient>
  </defs>
  <!-- Crown base -->
  <rect x="10" y="42" width="44" height="10" rx="2" fill="url(#gold)" stroke="#8b6914" stroke-width="1.5"/>
  <!-- Crown band -->
  <rect x="8" y="38" width="48" height="6" rx="2" fill="url(#gold)" stroke="#8b6914" stroke-width="1"/>
  <!-- Left point -->
  <polygon points="12,38 16,14 22,38" fill="url(#gold)" stroke="#8b6914" stroke-width="1"/>
  <!-- Center point -->
  <polygon points="26,38 32,6 38,38" fill="url(#gold)" stroke="#8b6914" stroke-width="1"/>
  <!-- Right point -->
  <polygon points="42,38 48,14 52,38" fill="url(#gold)" stroke="#8b6914" stroke-width="1"/>
  <!-- Jewels on points -->
  <circle cx="16" cy="16" r="3" fill="url(#jewel)" stroke="#660000" stroke-width="0.5"/>
  <circle cx="32" cy="8" r="4" fill="url(#jewel)" stroke="#660000" stroke-width="0.5"/>
  <circle cx="48" cy="16" r="3" fill="url(#jewel)" stroke="#660000" stroke-width="0.5"/>
  <!-- Jewels on band -->
  <circle cx="18" cy="41" r="2" fill="#1a5c1a" stroke="#0a3a0a" stroke-width="0.5"/>
  <circle cx="32" cy="41" r="2.5" fill="url(#jewel)" stroke="#660000" stroke-width="0.5"/>
  <circle cx="46" cy="41" r="2" fill="#1a5c1a" stroke="#0a3a0a" stroke-width="0.5"/>
</svg>
